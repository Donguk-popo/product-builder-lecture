<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Y857GWRVHE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-Y857GWRVHE');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맛집 추천하기 | 화곡식후경</title>
    <style>
        :root {
            --bg-color: #fdf5e6;
            --text-color: #4a3728;
            --button-bg: #d35400;
            --button-hover: #a04000;
            --container-bg: rgba(255, 255, 255, 0.95);
            --nav-bg: #4a3728;
            --nav-text: #fdf5e6;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #e0d5c1;
            --button-bg: #e67e22;
            --button-hover: #d35400;
            --container-bg: rgba(44, 44, 44, 0.95);
            --nav-bg: #000000;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(rgba(211, 84, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(211, 84, 0, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-color);
            line-height: 1.6;
        }

        nav {
            background-color: var(--nav-bg);
            color: var(--nav-text);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .main-content {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .container {
            background-color: var(--container-bg);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 1px solid rgba(211, 84, 0, 0.1);
        }

        h1 { text-align: center; color: var(--button-bg); font-size: 2.5rem; margin-bottom: 10px; }
        p.intro { text-align: center; margin-bottom: 40px; font-size: 1.1rem; }

        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-weight: bold; font-size: 1.1rem; }
        input, select, textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid #eee;
            border-radius: 12px;
            background-color: var(--bg-color);
            color: var(--text-color);
            box-sizing: border-box;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--button-bg);
        }
        
        button.submit-btn {
            width: 100%;
            padding: 18px;
            background-color: var(--button-bg);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(211, 84, 0, 0.3);
            margin-top: 10px;
        }
        button.submit-btn:hover { 
            background-color: var(--button-hover);
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(211, 84, 0, 0.4);
        }

        .notice {
            margin-top: 40px;
            padding: 25px;
            background-color: rgba(211, 84, 0, 0.05);
            border-left: 5px solid var(--button-bg);
            border-radius: 10px;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="location.href='index.html'">😋 화곡식후경</div>
        <div class="menu">
            <a href="index.html">홈</a>
            <a href="recommend.html">맛집 추천하기</a>
            <button class="theme-toggle" onclick="toggleTheme()" style="background:none; border:1px solid white; color:white; padding:5px 10px; border-radius:15px; cursor:pointer;">🌓 테마</button>
        </div>
    </nav>

    <div class="main-content">
        <div class="container">
            <h1>✍️ 나만의 맛집 추천</h1>
            <p class="intro">화곡동 주민들과 공유하고 싶은 진짜 맛집을 알려주세요!</p>

            <form action="https://formspree.io/f/xyklpbyb" method="POST">
                <div class="form-group">
                    <label for="restaurant-name">식당 이름</label>
                    <input type="text" id="restaurant-name" name="restaurant_name" placeholder="예: 화곡영양족발" required>
                </div>

                <div class="form-group">
                    <label for="category">음식 종류</label>
                    <select id="category" name="category" required>
                        <option value="">선택해주세요</option>
                        <option value="한식">한식</option>
                        <option value="중식">중식</option>
                        <option value="일식">일식</option>
                        <option value="양식">양식</option>
                        <option value="카페/디저트">카페/디저트</option>
                        <option value="기타">기타</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="location">위치 (지역)</label>
                    <select id="location" name="location" required>
                        <option value="">선택해주세요</option>
                        <option value="화곡역 주변">화곡역 주변</option>
                        <option value="까치산역 주변">까치산역 주변</option>
                        <option value="강서구청 인근">강서구청 인근</option>
                        <option value="우장산역 인근">우장산역 인근</option>
                        <option value="기타">기타</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="description">추천 이유 / 한줄평</label>
                    <textarea id="description" name="description" rows="4" placeholder="맛있었던 메뉴나 사장님의 친절함 등 자유롭게 적어주세요!" required></textarea>
                </div>

                <div class="form-group">
                    <label for="recommender">추천인 닉네임 (선택)</label>
                    <input type="text" id="recommender" name="recommender" placeholder="익명">
                </div>

                <button type="submit" class="submit-btn">맛집 추천 보내기</button>
            </form>

            <div class="notice">
                💡 <strong>알려드립니다:</strong> 제보해주신 맛집은 관리자 검토 후 메인 페이지의 랜덤 추천 리스트에 정식으로 추가됩니다. 소중한 제보 감사합니다!
            </div>
        </div>
    </div>

    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }
    </script>
</body>
</html>
