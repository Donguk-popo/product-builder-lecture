    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커피숍 추천 | STEC 반도체 장비 2기</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Pretendard:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --coffee: #6f4e37; --stec-blue: #004a99; --bg: #fffcf9; --white: #ffffff; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: #3e2723; }
        nav { background: var(--stec-blue); padding: 15px 5%; color: white; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; text-align: center; }
        h1 { font-family: 'Jua', sans-serif; font-size: 2.5rem; color: var(--coffee); }
        .pick-box { background: var(--white); padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(111,78,55,0.1); margin-bottom: 30px; }
        button.pick-btn { background: var(--coffee); color: white; border: none; padding: 15px 40px; font-size: 1.2rem; font-family: 'Jua', sans-serif; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        button.pick-btn:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(111,78,55,0.3); }
        #result { margin-top: 30px; min-height: 150px; }
        .res-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 2px solid var(--coffee); animation: pop 0.4s ease; text-align: left; }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } }
        .res-img { height: 200px; background-size: cover; background-position: center; }
        .res-info { padding: 20px; }
        .res-info h3 { margin: 0 0 10px; color: var(--coffee); }
        .res-info .zone { display: inline-block; background: #eee; padding: 2px 8px; border-radius: 5px; font-size: 0.8rem; margin-bottom: 5px; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: var(--stec-blue); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <div class="logo" style="font-weight: 800;">STEC <span>SEMI 2nd</span></div>
        <a href="index.html" style="color:white; text-decoration:none; font-weight:bold;">홈으로</a>
    </nav>
    <div class="container">
        <a href="index.html" class="back-btn">← 뒤로가기</a>
        <h1>☕ 카공 & 휴식 카페 추천</h1>
        <p>학원 주변(화곡역/강서구청) 카페 20선</p>
        <div class="pick-box">
            <button class="pick-btn" onclick="pickCoffee()">오늘의 카페 추천!</button>
            <div id="result">
                <p style="color: #d7ccc8; font-weight: bold;">카페인 수혈이 시급하신가요? 클릭해보세요.</p>
            </div>
        </div>
    </div>
    <script>
        const coffees = [
            { name: "투썸플레이스 화곡역점", zone: "화곡역", desc: "공부하기 좋은 넓은 좌석과 맛있는 케이크.", img: "https://images.unsplash.com/photo-1554118811-1e0d58224f24?w=500" },
            { name: "스타벅스 화곡역점", zone: "화곡역", desc: "믿고 가는 스벅, 공부 집중도가 높습니다.", img: "https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=500" },
            { name: "할리스 강서구청점", zone: "강서구청", desc: "24시간 운영(현재 확인 필요), 카공족의 성지.", img: "https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=500" },
            { name: "파스쿠찌 화곡역점", zone: "화곡역", desc: "이탈리아 감성 커피와 조용한 분위기.", img: "https://images.unsplash.com/photo-1511920170033-f8396924c348?w=500" },
            { name: "메가커피 화곡역점", zone: "화곡역", desc: "가성비 갑! 등원 길에 빠르게 픽업하기 좋음.", img: "https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?w=500" },
            { name: "컴포즈커피 화곡역점", zone: "화곡역", desc: "저렴한 가격에 훌륭한 퀄리티의 아메리카노.", img: "https://images.unsplash.com/photo-1442512595331-e89e73853f31?w=500" },
            { name: "백다방 화곡역점", zone: "화곡역", desc: "시원하고 양 많은 아이스크림과 커피.", img: "https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?w=500" },
            { name: "이디야 화곡역점", zone: "화곡역", desc: "아늑한 분위기에서 조용히 수다 떨기 좋음.", img: "https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=500" },
            { name: "카페 게이트", zone: "화곡역", desc: "빅사이즈 커피와 다양한 에이드 종류.", img: "https://images.unsplash.com/photo-1517701604599-bb29b565090c?w=500" },
            { name: "더벤티 화곡역점", zone: "화곡역", desc: "보라색 감성의 대용량 가성비 카페.", img: "https://images.unsplash.com/photo-1507133750040-4a8f5700e53c?w=500" },
            { name: "만랩커피", zone: "화곡동", desc: "스페셜티 커피를 합리적인 가격에 제공.", img: "https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=500" },
            { name: "공차 화곡역점", zone: "화곡역", desc: "쫀득한 타피오카 펄과 달콤한 밀크티.", img: "https://images.unsplash.com/photo-1576092768241-dec231879fc3?w=500" },
            { name: "카페 아에", zone: "화곡동", desc: "깔끔한 캔커피 패키징으로 인기 있는 곳.", img: "https://images.unsplash.com/photo-1511081692775-05d0f180a065?w=500" },
            { name: "카페 설", zone: "강서구청", desc: "감성적인 인테리어와 정성 가득한 디저트.", img: "https://images.unsplash.com/photo-1525648199074-cee30ba79a4a?w=500" },
            { name: "커피빈 강서구청점", zone: "강서구청", desc: "진한 커피향과 고급스러운 실내 분위기.", img: "https://images.unsplash.com/photo-1447933630913-221b4a60bc91?w=500" },
            { name: "설빙 화곡역점", zone: "화곡역", desc: "여름엔 역시 빙수! 동기들과 디저트 타임.", img: "https://images.unsplash.com/photo-1532634822-40d7b7d2d174?w=500" },
            { name: "우드진", zone: "화곡/우장산", desc: "우드톤 인테리어가 매력적인 감성 카페.", img: "https://images.unsplash.com/photo-1453614512568-c4024d13c247?w=500" },
            { name: "픽커피", zone: "화곡동", desc: "사장님의 커피 사랑이 느껴지는 드립 커피 전문점.", img: "https://images.unsplash.com/photo-1507133750040-4a8f5700e53c?w=500" },
            { name: "봉명동내커피", zone: "화곡동", desc: "배달로도 유명한 다양한 간식거리와 커피.", img: "https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?w=500" },
            { name: "빽다방 강서구청점", zone: "강서구청", desc: "푸짐한 양의 음료와 사라다빵 맛집.", img: "https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=500" }
        ];
        function pickCoffee() {
            const r = coffees[Math.floor(Math.random() * coffees.length)];
            document.getElementById('result').innerHTML = `
                <div class="res-card">
                    <div class="res-img" style="background-image: url('${r.img}')"></div>
                    <div class="res-info">
                        <span class="zone">${r.zone}</span>
                        <h3>${r.name}</h3>
                        <p>${r.desc}</p>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
