<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맛집 / 커피숍 리스트 | STEC 반도체 장비 2기</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --food-primary: #ff4757;
            --coffee-primary: #6f4e37;
            --stec-blue: #004a99;
            --bg: #f8f9fa;
            --white: #ffffff;
        }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: #2f3542; line-height: 1.6; }
        nav { background: var(--stec-blue); padding: 15px 5%; color: white; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 100; }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        
        .tab-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .tab-btn { padding: 12px 30px; border-radius: 50px; border: none; font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-family: 'Jua'; }
        .tab-btn.food-tab { background: #ffebeb; color: var(--food-primary); }
        .tab-btn.food-tab.active { background: var(--food-primary); color: white; transform: scale(1.05); }
        .tab-btn.coffee-tab { background: #f5f0ed; color: var(--coffee-primary); }
        .tab-btn.coffee-tab.active { background: var(--coffee-primary); color: white; transform: scale(1.05); }

        h1 { font-family: 'Jua', sans-serif; font-size: 2.5rem; text-align: center; margin-top: 0; }
        
        .add-section { background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 50px; border: 2px dashed #ddd; }
        .food-theme .add-section { border-color: var(--food-primary); }
        .coffee-theme .add-section { border-color: var(--coffee-primary); }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; }
        .form-grid input { padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; }
        .add-btn { color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .food-theme .add-btn { background: var(--food-primary); }
        .coffee-theme .add-btn { background: var(--coffee-primary); }
        
        .list-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .res-card { background: var(--white); border-radius: 20px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.05); transition: transform 0.2s; }
        .res-card:hover { transform: translateY(-5px); }
        .res-card h3 { margin: 0 0 10px; font-size: 1.4rem; color: var(--stec-blue); font-family: 'Jua'; }
        .res-card p { font-size: 0.95rem; color: #57606f; margin-bottom: 15px; }
        .zone { font-size: 0.8rem; background: #eee; padding: 3px 8px; border-radius: 5px; color: #666; margin-bottom: 10px; display: inline-block; }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body class="food-theme">
    <nav><div class="logo">STEC <span>SEMI 2nd</span></div><a href="index.html" style="color:white; text-decoration:none; font-weight:bold;">홈으로</a></nav>
    <div class="container">
        <div class="tab-container">
            <button class="tab-btn food-tab active" onclick="switchTab('food')">🍱 맛집</button>
            <button class="tab-btn coffee-tab" onclick="switchTab('coffee')">☕ 카페</button>
        </div>

        <h1 id="main-title">🍱 우리동네 맛집 제보</h1>
        
        <section class="add-section">
            <div class="form-grid">
                <input type="text" id="new-name" placeholder="상호명">
                <input type="text" id="new-desc" placeholder="추천 이유 또는 한줄평">
                <button class="add-btn" onclick="addItem()">제보하기</button>
            </div>
        </section>

        <div id="item-list" class="list-grid">
            <p style="text-align:center; grid-column: 1/-1;">데이터를 불러오는 중...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCa_R4StCH81IxkmbPcxxiLiawJMwFxS1M",
            authDomain: "stec-chat.firebaseapp.com",
            databaseURL: "https://stec-chat-default-rtdb.firebaseio.com",
            projectId: "stec-chat"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        let currentType = 'food';

        function switchTab(type) {
            currentType = type;
            document.body.className = `${type}-theme`;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.${type}-tab`).classList.add('active');
            document.getElementById('main-title').innerText = type === 'food' ? '🍱 우리동네 맛집 제보' : '☕ 우리동네 카페 제보';
            loadData();
        }

        function addItem() {
            const name = document.getElementById('new-name').value.trim();
            const desc = document.getElementById('new-desc').value.trim();
            if(!name || !desc) return alert('상호명과 추천 이유를 적어주세요!');

            database.ref(currentType).push({
                name, desc,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });

            document.getElementById('new-name').value = '';
            document.getElementById('new-desc').value = '';
        }

        function loadData() {
            const listEl = document.getElementById('item-list');
            database.ref(currentType).on('value', (snapshot) => {
                listEl.innerHTML = '';
                const data = snapshot.val();
                if(!data) {
                    listEl.innerHTML = '<p style="text-align:center; grid-column: 1/-1;">아직 등록된 정보가 없습니다. 첫 제보자가 되어보세요!</p>';
                    return;
                }
                Object.values(data).reverse().forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'res-card';
                    card.innerHTML = `
                        <span class="zone">학생 제보</span>
                        <h3>${item.name}</h3>
                        <p>${item.desc}</p>
                        <a href="https://search.naver.com/search.naver?query=화곡역+${item.name}" target="_blank" style="font-size:0.8rem; color:var(--stec-blue);">네이버 검색 ↗</a>
                    `;
                    listEl.appendChild(card);
                });
            });
        }

        loadData();
    </script>
</body>
</html>
