<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- Google tag (gtag.js) -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맛집 리스트 | STEC 반도체 장비 2기</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4757;
            --stec-blue: #004a99;
            --bg: #f8f9fa;
            --white: #ffffff;
            --user-item-bg: #fff9db;
            --user-item-border: #fcc419;
        }

        [data-theme="dark"] {
            --bg: #12141a;
            --white: #1c1f26;
            --user-item-bg: #2d2a15;
            --user-item-border: #fcc419;
        }

        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: #2f3542; transition: all 0.3s; }
        nav { background: var(--stec-blue); padding: 15px 5%; color: white; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 100; }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        
        h1 { font-family: 'Jua', sans-serif; font-size: 2.5rem; color: var(--primary); text-align: center; }
        .intro-text { text-align: center; margin-bottom: 40px; color: #747d8c; }

        /* Add Form Style */
        .add-section { background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 50px; border: 2px dashed var(--primary); }
        .add-section h2 { font-family: 'Jua', sans-serif; margin-top: 0; color: var(--primary); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; margin-top: 20px; }
        .form-grid input { padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 0 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* List Style */
        .list-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .res-card { background: var(--white); border-radius: 20px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); position: relative; border: 1px solid rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: space-between; }
        .res-card.user-added { background: var(--user-item-bg); border: 2px solid var(--user-item-border); }
        
        .res-card h3 { margin: 0 0 10px 0; font-size: 1.4rem; color: var(--stec-blue); }
        .res-card .zone { font-size: 0.85rem; font-weight: bold; background: #eee; padding: 3px 8px; border-radius: 5px; color: #666; margin-bottom: 10px; display: inline-block; }
        .res-card p { font-size: 0.95rem; color: #57606f; margin-bottom: 20px; }

        /* Vote Buttons */
        .vote-area { display: flex; gap: 10px; border-top: 1px solid #eee; padding-top: 15px; }
        .vote-btn { background: none; border: 1px solid #ddd; padding: 5px 12px; border-radius: 15px; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; transition: all 0.2s; }
        .vote-btn:hover { background: #f1f2f6; }
        .vote-btn.up:hover { border-color: #2ed573; color: #2ed573; }
        .vote-btn.down:hover { border-color: #ff4757; color: #ff4757; }
        
        .back-btn { display: inline-block; margin-bottom: 20px; color: var(--stec-blue); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <div class="logo" style="font-weight: 800;">STEC <span>SEMI 2nd</span></div>
        <a href="index.html" style="color:white; text-decoration:none; font-weight:bold;">홈으로</a>
    </nav>

    <div class="container">
        <a href="index.html" class="back-btn">← 뒤로가기</a>
        <h1>🍱 화곡동 맛집 리스트 20+</h1>
        <p class="intro-text">반도체 장비 2기 원우들이 추천하는 진짜 밥집 지도</p>

        <!-- 직접 추가하기 칸 -->
        <section class="add-section">
            <h2>✍️ 나만 아는 맛집 제보하기</h2>
            <div class="form-grid">
                <input type="text" id="new-res-name" placeholder="식당 이름">
                <input type="text" id="new-res-desc" placeholder="추천 이유 (예: 김치찌개 맛집)">
                <button class="add-btn" onclick="addNewItem()">추가하기</button>
            </div>
        </section>

        <div id="food-list" class="list-grid">
            <!-- 리스트 아이템들이 여기에 렌더링됩니다 -->
        </div>
    </div>

    <script>
        const defaultFoods = [
            { id: 1, name: "화곡영양족발", zone: "화곡역", desc: "시장 안 전설! 쫀득한 족발과 순대국 서비스.", likes: 15, dislikes: 1 },
            { id: 2, name: "전주뼈해장국", zone: "강서구청", desc: "고기가 산더미처럼 쌓여 나오는 찐 해장 성지.", likes: 12, dislikes: 0 },
            { id: 3, name: "오남매닭갈비", zone: "화곡역", desc: "철판에서 볶아지는 매콤한 맛! 볶음밥 필수.", likes: 9, dislikes: 1 },
            { id: 4, name: "광영수산", zone: "까치산역", desc: "가성비 회 맛집! 푸짐한 스키다시가 특징.", likes: 7, dislikes: 2 },
            { id: 5, name: "대왕곱창", zone: "까치산역", desc: "곱이 꽉 찬 소곱창! 고소함의 끝판왕.", likes: 11, dislikes: 0 },
            { id: 6, name: "남도식당", zone: "화곡동", desc: "집밥이 그리울 때 찾는 최고의 백반집.", likes: 8, dislikes: 0 },
            { id: 7, name: "이조면옥", zone: "화곡역", desc: "시원한 함흥냉면과 뜨끈한 왕갈비탕.", likes: 5, dislikes: 1 },
            { id: 8, name: "미담진족", zone: "화곡동", desc: "깔끔한 인테리어와 부드러운 족발의 조화.", likes: 4, dislikes: 0 },
            { id: 9, name: "명륜진사갈비 화곡점", zone: "화곡역", desc: "무한리필 갈비로 동기들과 배 터지게 회식!", likes: 10, dislikes: 3 },
            { id: 10, name: "서보정", zone: "강서구청", desc: "짬뽕 국물이 끝내주는 전통의 중식당.", likes: 6, dislikes: 1 },
            { id: 11, name: "정가네 팥칼국수", zone: "화곡동", desc: "진한 팥물과 쫄깃한 면발의 건강한 한 끼.", likes: 3, dislikes: 0 },
            { id: 12, name: "황소곱창", zone: "화곡본동", desc: "잡내 없이 깔끔한 소곱창과 대창.", likes: 5, dislikes: 0 },
            { id: 13, name: "성순이네 숯불닭갈비", zone: "강서구청", desc: "숯불 향이 가득 밴 부드러운 닭갈비.", likes: 7, dislikes: 0 },
            { id: 14, name: "백소정 화곡역점", zone: "화곡역", desc: "두툼한 돈카츠와 마제소바 전문점.", likes: 14, dislikes: 1 },
            { id: 15, name: "스시현", zone: "화곡역", desc: "합리적인 가격에 즐기는 신선한 초밥 세트.", likes: 6, dislikes: 0 },
            { id: 16, name: "듬박이찌개", zone: "화곡역", desc: "김치찌개와 라면사리 무한리필의 행복.", likes: 8, dislikes: 1 },
            { id: 17, name: "한옥집김치찜", zone: "화곡역", desc: "새콤한 묵은지와 부드러운 돼지고기 찜.", likes: 5, dislikes: 0 },
            { id: 18, name: "맛나분식", zone: "화곡시장", desc: "시장 떡볶이의 정석! 튀김과 순대의 환상 궁합.", likes: 9, dislikes: 0 },
            { id: 19, name: "신월동 탕수육", zone: "신월/화곡", desc: "고기 함량이 높은 바삭한 탕수육 맛집.", likes: 4, dislikes: 1 },
            { id: 20, name: "본가탕탕이", zone: "강서구청", desc: "낙지 탕탕이와 연포탕으로 기력 보충!", likes: 3, dislikes: 0 }
        ];

        let userFoods = JSON.parse(localStorage.getItem('userFoods')) || [];

        function renderList() {
            const listEl = document.getElementById('food-list');
            listEl.innerHTML = '';

            // 기본 리스트 출력
            defaultFoods.forEach(item => {
                listEl.appendChild(createCard(item, false));
            });

            // 사용자 추가 리스트 출력 (다른 색상)
            userFoods.forEach(item => {
                listEl.appendChild(createCard(item, true));
            });
        }

        function createCard(item, isUser) {
            const card = document.createElement('div');
            card.className = `res-card ${isUser ? 'user-added' : ''}`;
            card.innerHTML = `
                <div>
                    <span class="zone">${item.zone || '학생 제보'}</span>
                    <h3>${item.name}</h3>
                    <p>${item.desc}</p>
                </div>
                <div class="vote-area">
                    <button class="vote-btn up" onclick="vote('${item.id}', 'up', ${isUser})">👍 <span>${item.likes}</span></button>
                    <button class="vote-btn down" onclick="vote('${item.id}', 'down', ${isUser})">👎 <span>${item.dislikes}</span></button>
                </div>
            `;
            return card;
        }

        function addNewItem() {
            const name = document.getElementById('new-res-name').value;
            const desc = document.getElementById('new-res-desc').value;

            if (!name || !desc) {
                alert('이름과 추천 이유를 적어주세요!');
                return;
            }

            const newItem = {
                id: 'user-' + Date.now(),
                name: name,
                zone: '학생 제보',
                desc: desc,
                likes: 0,
                dislikes: 0
            };

            userFoods.push(newItem);
            localStorage.setItem('userFoods', JSON.stringify(userFoods));
            renderList();

            document.getElementById('new-res-name').value = '';
            document.getElementById('new-res-desc').value = '';
        }

        function vote(id, type, isUser) {
            const list = isUser ? userFoods : defaultFoods;
            const item = list.find(i => i.id == id);
            
            if (item) {
                if (type === 'up') item.likes++;
                else item.dislikes++;
                
                if (isUser) {
                    localStorage.setItem('userFoods', JSON.stringify(userFoods));
                }
                renderList();
            }
        }

        renderList();
    </script>
</body>
</html>
