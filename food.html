<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Y857GWRVHE"></script>

      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

      gtag('config', 'G-Y857GWRVHE');

    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "welo4j25g7");

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맛집 리스트 | STEC 반도체 장비 2기</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4757;
            --stec-blue: #004a99;
            --bg: #f8f9fa;
            --white: #ffffff;
            --user-item-bg: #fff9db;
            --user-item-border: #fcc419;
        }

        [data-theme="dark"] {
            --bg: #12141a;
            --white: #1c1f26;
            --user-item-bg: #2d2a15;
            --user-item-border: #fcc419;
        }

        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: #2f3542; transition: all 0.3s; }
        nav { background: var(--stec-blue); padding: 15px 5%; color: white; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 100; }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        
        h1 { font-family: 'Jua', sans-serif; font-size: 2.5rem; color: var(--primary); text-align: center; }
        .intro-text { text-align: center; margin-bottom: 40px; color: #747d8c; }

        /* Form */
        .add-section { background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 50px; border: 2px dashed var(--primary); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; margin-top: 20px; }
        .form-grid input { padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 0 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* Grid */
        .list-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .res-card { background: var(--white); border-radius: 20px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: space-between; }
        .res-card.user-added { background: var(--user-item-bg); border: 2px solid var(--user-item-border); }
        
        /* Clickable Title */
        .res-title-btn { background: none; border: none; padding: 0; text-align: left; cursor: pointer; width: 100%; font-family: inherit; }
        .res-title-btn h3 { margin: 0 0 10px 0; font-size: 1.4rem; color: var(--stec-blue); text-decoration: underline; text-decoration-color: rgba(0,74,153,0.3); transition: 0.2s; }
        .res-title-btn:hover h3 { color: var(--primary); }

        .res-card .zone { font-size: 0.85rem; font-weight: bold; background: #eee; padding: 3px 8px; border-radius: 5px; color: #666; margin-bottom: 10px; display: inline-block; }
        
        .vote-area { display: flex; gap: 10px; border-top: 1px solid #eee; padding-top: 15px; }
        .vote-btn { background: none; border: 1px solid #ddd; padding: 5px 12px; border-radius: 15px; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; transition: all 0.2s; }
        .vote-btn.voted { background: #eee; cursor: not-allowed; opacity: 0.6; }
        .vote-btn.up:hover:not(.voted) { border-color: #2ed573; color: #2ed573; }
        .vote-btn.down:hover:not(.voted) { border-color: #ff4757; color: #ff4757; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--white); width: 90%; max-width: 600px; max-height: 80vh; border-radius: 30px; padding: 40px; position: relative; overflow-y: auto; }
        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 2rem; cursor: pointer; border: none; background: none; color: #ccc; }
        
        .map-btn { display: block; width: 100%; padding: 15px; background: #2ed573; color: white; text-align: center; text-decoration: none; border-radius: 15px; font-weight: 800; margin: 20px 0; }
        
        .review-section { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        .review-list { margin-bottom: 20px; max-height: 200px; overflow-y: auto; }
        .review-item { background: #f1f2f6; padding: 10px 15px; border-radius: 10px; margin-bottom: 10px; font-size: 0.9rem; }
        .review-input-group { display: flex; gap: 10px; }
        .review-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 10px; }
        
        .back-btn { display: inline-block; margin-bottom: 20px; color: var(--stec-blue); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <div class="logo" style="font-weight: 800;">STEC <span>SEMI 2nd</span></div>
        <a href="index.html" style="color:white; text-decoration:none; font-weight:bold;">홈으로</a>
    </nav>

    <div class="container">
        <a href="index.html" class="back-btn">← 뒤로가기</a>
        <h1>🍱 화곡동 맛집 리스트</h1>
        <p class="intro-text">반도체 장비 2기 원우들이 추천하는 진짜 밥집 (이름 클릭시 상세정보)</p>

        <section class="add-section">
            <div class="form-grid">
                <input type="text" id="new-res-name" placeholder="식당 이름">
                <input type="text" id="new-res-desc" placeholder="추천 이유">
                <button class="add-btn" onclick="addNewItem()">추가하기</button>
            </div>
        </section>

        <div id="food-list" class="list-grid"></div>
    </div>

    <!-- Modal Layout -->
    <div id="res-modal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <h2 id="modal-name" style="font-family: 'Jua'; color: var(--stec-blue); font-size: 2.2rem; margin-top: 0;"></h2>
            <p id="modal-desc" style="font-size: 1.1rem; color: #666;"></p>
            
            <a id="modal-map-link" href="#" target="_blank" class="map-btn">📍 네이버 지도로 위치 보기</a>

            <div class="review-section">
                <h3>💬 원우들 한줄평</h3>
                <div id="modal-reviews" class="review-list"></div>
                <div class="review-input-group">
                    <input type="text" id="review-text" class="review-input" placeholder="후기를 남겨주세요!">
                    <button class="add-btn" onclick="addReview()">등록</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const defaultFoods = [
            { id: 1, name: "화곡영양족발", zone: "화곡역", desc: "시장 안 전설! 쫀득한 족발과 순대국 서비스." },
            { id: 2, name: "전주뼈해장국", zone: "강서구청", desc: "고기가 산더미처럼 쌓여 나오는 찐 해장 성지." },
            { id: 3, name: "오남매닭갈비", zone: "화곡역", desc: "철판에서 볶아지는 매콤한 맛! 볶음밥 필수." },
            { id: 4, name: "광영수산", zone: "까치산역", desc: "가성비 회 맛집! 푸짐한 스키다시가 특징." },
            { id: 5, name: "대왕곱창", zone: "까치산역", desc: "곱이 꽉 찬 소곱창! 고소함의 끝판왕." },
            { id: 6, name: "남도식당", zone: "화곡동", desc: "집밥이 그리울 때 찾는 최고의 백반집." },
            { id: 7, name: "이조면옥", zone: "화곡역", desc: "시원한 함흥냉면과 뜨끈한 왕갈비탕." },
            { id: 8, name: "미담진족", zone: "화곡동", desc: "깔끔한 인테리어와 부드러운 족발의 조화." },
            { id: 9, name: "명륜진사갈비 화곡점", zone: "화곡역", desc: "무한리필 갈비로 동기들과 배 터지게 회식!" },
            { id: 10, name: "서보정", zone: "강서구청", desc: "짬뽕 국물이 끝내주는 전통의 중식당." },
            { id: 11, name: "정가네 팥칼국수", zone: "화곡동", desc: "진한 팥물과 쫄깃한 면발의 건강한 한 끼." },
            { id: 12, name: "황소곱창", zone: "화곡본동", desc: "잡내 없이 깔끔한 소곱창과 대창." },
            { id: 13, name: "성순이네 숯불닭갈비", zone: "강서구청", desc: "숯불 향이 가득 밴 부드러운 닭갈비." },
            { id: 14, name: "백소정 화곡역점", zone: "화곡역", desc: "두툼한 돈카츠와 마제소바 전문점." },
            { id: 15, name: "스시현", zone: "화곡역", desc: "합리적인 가격에 즐기는 신선한 초밥 세트." },
            { id: 16, name: "듬박이찌개", zone: "화곡역", desc: "김치찌개와 라면사리 무한리필의 행복." },
            { id: 17, name: "한옥집김치찜", zone: "화곡역", desc: "새콤한 묵은지와 부드러운 돼지고기 찜." },
            { id: 18, name: "맛나분식", zone: "화곡시장", desc: "시장 떡볶이의 정석! 튀김과 순대의 환상 궁합." },
            { id: 19, name: "신월동 탕수육", zone: "신월/화곡", desc: "고기 함량이 높은 바삭한 탕수육 맛집." },
            { id: 20, name: "본가탕탕이", zone: "강서구청", desc: "낙지 탕탕이와 연포탕으로 기력 보충!" }
        ];

        let state = JSON.parse(localStorage.getItem('foodState')) || {
            userAdded: [],
            votes: {}, // { id: {up: 0, down: 0} }
            votedIds: [], // ['id1', 'id2']
            reviews: {} // { id: ['review1', 'review2'] }
        };

        let currentActiveId = null;

        function saveState() { localStorage.setItem('foodState', JSON.stringify(state)); }

        function renderList() {
            const listEl = document.getElementById('food-list');
            listEl.innerHTML = '';
            [...defaultFoods, ...state.userAdded].forEach(item => {
                const voteInfo = state.votes[item.id] || { up: 0, down: 0 };
                const hasVoted = state.votedIds.includes(String(item.id));
                const card = document.createElement('div');
                card.className = `res-card ${item.id.toString().startsWith('u') ? 'user-added' : ''}`;
                card.innerHTML = `
                    <div>
                        <span class="zone">${item.zone || '학생 제보'}</span>
                        <button class="res-title-btn" onclick="openModal('${item.id}', '${item.name}', '${item.desc}')">
                            <h3>${item.name}</h3>
                        </button>
                        <p>${item.desc.substring(0, 40)}...</p>
                    </div>
                    <div class="vote-area">
                        <button class="vote-btn up ${hasVoted ? 'voted' : ''}" onclick="vote('${item.id}', 'up')">👍 <span>${voteInfo.up}</span></button>
                        <button class="vote-btn down ${hasVoted ? 'voted' : ''}" onclick="vote('${item.id}', 'down')">👎 <span>${voteInfo.down}</span></button>
                    </div>
                `;
                listEl.appendChild(card);
            });
        }

        function addNewItem() {
            const name = document.getElementById('new-res-name').value;
            const desc = document.getElementById('new-res-desc').value;
            if (!name || !desc) return alert('내용을 입력하세요!');
            const newItem = { id: 'u' + Date.now(), name, desc, zone: '학생 제보' };
            state.userAdded.push(newItem);
            saveState();
            renderList();
            document.getElementById('new-res-name').value = '';
            document.getElementById('new-res-desc').value = '';
        }

        function vote(id, type) {
            if (state.votedIds.includes(String(id))) return alert('이미 투표하셨습니다!');
            if (!state.votes[id]) state.votes[id] = { up: 0, down: 0 };
            state.votes[id][type]++;
            state.votedIds.push(String(id));
            saveState();
            renderList();
        }

        function openModal(id, name, desc) {
            currentActiveId = id;
            document.getElementById('modal-name').innerText = name;
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('modal-map-link').href = `https://search.naver.com/search.naver?query=화곡동+${name}`;
            renderReviews();
            document.getElementById('res-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('res-modal').style.display = 'none'; }

        function renderReviews() {
            const list = document.getElementById('modal-reviews');
            list.innerHTML = '';
            (state.reviews[currentActiveId] || []).forEach(rev => {
                const div = document.createElement('div');
                div.className = 'review-item';
                div.innerText = rev;
                list.appendChild(div);
            });
        }

        function addReview() {
            const text = document.getElementById('review-text').value;
            if (!text) return;
            if (!state.reviews[currentActiveId]) state.reviews[currentActiveId] = [];
            state.reviews[currentActiveId].push(text);
            saveState();
            renderReviews();
            document.getElementById('review-text').value = '';
        }

        window.onclick = (e) => { if(e.target == document.getElementById('res-modal')) closeModal(); };
        renderList();
    </script>
</body>
</html>
