<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맛집 / 커피숍 리스트 | STEC 반도체 장비 2기</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --food-primary: #ff4757;
            --coffee-primary: #6f4e37;
            --stec-blue: #004a99;
            --bg: #f8f9fa;
            --white: #ffffff;
            --top-gold: #ffd700;
        }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: #2f3542; line-height: 1.6; }
        nav { background: var(--stec-blue); padding: 15px 5%; color: white; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 100; }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        
        .tab-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .tab-btn { padding: 12px 30px; border-radius: 50px; border: none; font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-family: 'Jua'; }
        .tab-btn.food-tab { background: #ffebeb; color: var(--food-primary); }
        .tab-btn.food-tab.active { background: var(--food-primary); color: white; transform: scale(1.05); }
        .tab-btn.coffee-tab { background: #f5f0ed; color: var(--coffee-primary); }
        .tab-btn.coffee-tab.active { background: var(--coffee-primary); color: white; transform: scale(1.05); }

        h1 { font-family: 'Jua', sans-serif; font-size: 2.5rem; text-align: center; margin-top: 0; word-break: keep-all; }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.8rem; }
            .section-title { font-size: 1.5rem; }
            .list-grid { grid-template-columns: 1fr; }
            .tab-btn { padding: 10px 20px; font-size: 0.9rem; }
        }
        
        .section-title { font-family: 'Jua'; font-size: 1.8rem; margin: 40px 0 20px; display: flex; align-items: center; gap: 10px; }
        
        .add-section { background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 40px; border: 2px dashed #ddd; }
        .food-theme .add-section { border-color: var(--food-primary); }
        .coffee-theme .add-section { border-color: var(--coffee-primary); }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; }
        .form-grid input { padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; }
        .add-btn { color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .food-theme .add-btn { background: var(--food-primary); }
        .coffee-theme .add-btn { background: var(--coffee-primary); }
        
        .list-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .res-card { background: var(--white); border-radius: 20px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.05); position: relative; }
        .res-card.top-rank { border: 2px solid var(--top-gold); background: #fffdf0; }
        .rank-tag { position: absolute; top: -10px; left: 20px; background: var(--top-gold); color: #3c1e1e; padding: 5px 15px; border-radius: 10px; font-weight: 800; font-size: 0.9rem; }
        
        .res-card h3 { margin: 10px 0 10px; font-size: 1.4rem; color: var(--stec-blue); font-family: 'Jua'; }
        .res-card p { font-size: 0.95rem; color: #57606f; margin-bottom: 15px; }
        .zone { font-size: 0.8rem; background: #eee; padding: 3px 8px; border-radius: 5px; color: #666; display: inline-block; }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body class="food-theme">
    <nav><div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">STEC <span>SEMI 2nd</span></div><a href="index.html" style="color:white; text-decoration:none; font-weight:bold;">홈으로</a></nav>
    <div class="container">
        <div class="tab-container">
            <button class="tab-btn food-tab active" onclick="switchTab('food')">🍱 맛집</button>
            <button class="tab-btn coffee-tab" onclick="switchTab('coffee')">☕ 카페</button>
        </div>

        <h1 id="main-title">🍱 화곡동 맛집 리스트</h1>

        <div id="top-area">
            <h2 class="section-title">👑 오늘의 TOP 3</h2>
            <div id="top-list" class="list-grid"></div>
        </div>
        
        <h2 class="section-title">✍️ 학생 제보하기</h2>
        <section class="add-section">
            <div class="form-grid">
                <input type="text" id="new-name" placeholder="상호명">
                <input type="text" id="new-desc" placeholder="추천 이유">
                <button class="add-btn" onclick="addItem()">제보하기</button>
            </div>
        </section>

        <h2 class="section-title">📋 모든 리스트</h2>
        <div id="item-list" class="list-grid"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCa_R4StCH81IxkmbPcxxiLiawJMwFxS1M",
            authDomain: "stec-chat.firebaseapp.com",
            databaseURL: "https://stec-chat-default-rtdb.firebaseio.com",
            projectId: "stec-chat"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const defaults = {
            food: [
                { name: "화곡영양족발", zone: "화곡본동시장", desc: "서울 3대 족발! 쫀득한 식감과 푸짐한 순대국 서비스가 일품.", rank: 1 },
                { name: "동래정 화곡점", zone: "화곡역", desc: "직접 구워주는 육즙 가득 가브리살 전문점. 멜조림 볶음밥 필수!", rank: 2 },
                { name: "신고집해물찜", zone: "화곡역", desc: "푸짐한 해산물과 중독성 있는 매콤한 양념의 조화.", rank: 3 }
            ],
            coffee: [
                { name: "체르보 (Cervo)", zone: "화곡역", desc: "화곡역 근처에서 가장 넓고 쾌적한 카페. 깔끔한 인테리어와 조용한 분위기로 강추!", rank: 1 },
                { name: "이층창가", zone: "화곡역", desc: "채광 좋은 감성 카페. 직접 만드는 수제 디저트와 마카롱이 정말 맛있어요.", rank: 2 },
                { name: "일도커피", zone: "화곡동", desc: "감각적인 인테리어와 고소한 라떼가 일품인 핫한 신상 카페.", rank: 3 }
            ]
        };
        
        let currentType = 'food';

        function switchTab(type) {
            currentType = type;
            document.body.className = `${type}-theme`;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.${type}-tab`).classList.add('active');
            document.getElementById('main-title').innerText = type === 'food' ? '🍱 화곡동 맛집 리스트' : '☕ 화곡동 카페 리스트';
            loadData();
        }

        function createCard(item, isTop = false) {
            const card = document.createElement('div');
            card.className = `res-card ${isTop ? 'top-rank' : ''}`;
            let rankTag = isTop ? `<div class="rank-tag">TOP ${item.rank}</div>` : '';
            card.innerHTML = `
                ${rankTag}
                <span class="zone">${item.zone || '학생 제보'}</span>
                <h3>${item.name}</h3>
                <p>${item.desc}</p>
                <a href="https://search.naver.com/search.naver?query=화곡역+${item.name}" target="_blank" style="font-size:0.8rem; color:var(--stec-blue);">네이버 검색 ↗</a>
            `;
            return card;
        }

        function addItem() {
            const name = document.getElementById('new-name').value.trim();
            const desc = document.getElementById('new-desc').value.trim();
            if(!name || !desc) return alert('상호명과 추천 이유를 적어주세요!');
            database.ref(`v2_${currentType}`).push({ name, desc, zone: '학생 제보', timestamp: firebase.database.ServerValue.TIMESTAMP });
            document.getElementById('new-name').value = '';
            document.getElementById('new-desc').value = '';
        }

        function loadData() {
            const topListEl = document.getElementById('top-list');
            const itemListEl = document.getElementById('item-list');
            
            // Render Defaults
            topListEl.innerHTML = '';
            defaults[currentType].forEach(item => topListEl.appendChild(createCard(item, true)));

            // Render Firebase Data
            database.ref(`v2_${currentType}`).on('value', (snapshot) => {
                itemListEl.innerHTML = '';
                const data = snapshot.val();
                if(data) {
                    Object.values(data).reverse().forEach(item => {
                        itemListEl.appendChild(createCard(item));
                    });
                } else {
                    itemListEl.innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:#999;">아직 제보된 정보가 없습니다.</p>';
                }
            });
        }

        loadData();
    </script>
</body>
</html>
