<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수다 talk | STEC 반도체 장비 2기</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --kakao-yellow: #fee500;
            --kakao-brown: #3c1e1e;
            --chat-bg: #bacee0;
            --my-bubble: #fee500;
            --other-bubble: #ffffff;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            background-color: var(--chat-bg);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .back-btn { text-decoration: none; color: var(--kakao-brown); font-weight: 800; }
        .title { font-weight: 800; font-size: 1.1rem; }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }

        .message {
            max-width: 80%;
            display: flex;
            flex-direction: column;
        }

        .message.mine {
            align-self: flex-end;
            align-items: flex-end;
        }

        .user-name {
            font-size: 0.8rem;
            margin-bottom: 5px;
            color: #444;
            font-weight: 600;
        }

        .bubble {
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message.mine .bubble {
            background-color: var(--my-bubble);
            border-top-right-radius: 2px;
        }

        .message.other .bubble {
            background-color: var(--other-bubble);
            border-top-left-radius: 2px;
        }

        .time {
            font-size: 0.7rem;
            color: #777;
            margin-top: 5px;
        }

        .input-area {
            background-color: white;
            padding: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #name-input {
            width: 80px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        #message-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
        }

        #send-btn {
            background-color: var(--kakao-yellow);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            color: var(--kakao-brown);
        }

        #loader {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #777;
            background: rgba(255,255,255,0.8);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn">←</a>
        <div class="title">💬 수다 talk <span id="connection-status" style="font-size: 0.6rem; vertical-align: middle; margin-left: 5px; padding: 2px 6px; border-radius: 10px; background: #eee; color: #777;">연결 확인 중...</span></div>
        <div style="width: 20px;"></div>
    </header>

    <div id="chat-container">
        <div id="loader">채팅 서버에 연결 중...</div>
    </div>

    <div class="input-area">
        <input type="text" id="name-input" placeholder="이름" value="익명">
        <input type="text" id="message-input" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) sendMessage()">
        <button id="send-btn" onclick="sendMessage()">전송</button>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        (function() {
            const chatContainer = document.getElementById('chat-container');
            const loader = document.getElementById('loader');
            
            // Firebase 설정 (Public Read/Write가 허용된 DB여야 함)
            const firebaseConfig = {
                databaseURL: "https://stec-chat-default-rtdb.firebaseio.com" 
            };

            let chatRef;
            const myId = localStorage.getItem('stec_chat_user_id') || 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('stec_chat_user_id', myId);

            function appendMessage(msg, type = 'normal') {
                if(loader) loader.style.display = 'none';
                const msgDiv = document.createElement('div');
                const isMine = msg.senderId === myId;
                
                if (type === 'system') {
                    msgDiv.className = 'message other';
                    msgDiv.style.alignSelf = 'center';
                    msgDiv.innerHTML = `<div class="bubble" style="background:#eee; font-size:0.8rem;">${msg.content}</div>`;
                } else {
                    msgDiv.className = `message ${isMine ? 'mine' : 'other'}`;
                    msgDiv.innerHTML = `
                        <div class="user-name">${msg.name || '익명'}</div>
                        <div class="bubble">${msg.content}</div>
                        <div class="time">${msg.time || ''}</div>
                    `;
                }
                chatContainer.appendChild(msgDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }

            function initFirebase() {
                try {
                    if (!firebase.apps.length) {
                        firebase.initializeApp(firebaseConfig);
                    }
                    const database = firebase.database();
                    chatRef = database.ref('messages');

                    chatRef.limitToLast(50).on('value', (snapshot) => {
                        chatContainer.innerHTML = '';
                        const data = snapshot.val();
                        if (!data) {
                            appendMessage({ content: '대화 기록이 없습니다. 먼저 말을 걸어보세요!' }, 'system');
                        } else {
                            Object.values(data).forEach(msg => appendMessage(msg));
                        }
                    }, (error) => {
                        console.error("Firebase Error:", error);
                        loader.innerText = "서버 연결 오류: " + error.message;
                    });

                    // 연결 상태 실시간 모니터링
                    const statusBadge = document.getElementById('connection-status');
                    database.ref('.info/connected').on('value', (snapshot) => {
                        if (snapshot.val() === true) {
                            statusBadge.innerText = '● Online';
                            statusBadge.style.background = '#e6fffa';
                            statusBadge.style.color = '#38a169';
                        } else {
                            statusBadge.innerText = '○ Offline';
                            statusBadge.style.background = '#fff5f5';
                            statusBadge.style.color = '#e53e3e';
                        }
                    });
                } catch (e) {
                    console.error("Init Error:", e);
                    loader.innerText = "초기화 오류가 발생했습니다.";
                }
            }

            window.sendMessage = function() {
                const nameInput = document.getElementById('name-input');
                const messageInput = document.getElementById('message-input');
                const content = messageInput.value.trim();
                
                if (!content || !chatRef) return;

                const newMsg = {
                    senderId: myId,
                    name: nameInput.value.trim() || "익명",
                    content: content,
                    time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                };

                chatRef.push(newMsg);
                messageInput.value = '';
            };

            // SDK 로드 대기 후 초기화
            const checkFirebase = setInterval(() => {
                if (typeof firebase !== 'undefined') {
                    clearInterval(checkFirebase);
                    initFirebase();
                }
            }, 100);
        })();
    </script>
</body>
</html>
