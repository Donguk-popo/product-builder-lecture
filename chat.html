<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수다 talk | STEC 반도체 장비 2기</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --kakao-yellow: #fee500;
            --kakao-brown: #3c1e1e;
            --chat-bg: #bacee0;
            --my-bubble: #fee500;
            --other-bubble: #ffffff;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            background-color: var(--chat-bg);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .back-btn { text-decoration: none; color: var(--kakao-brown); font-weight: 800; }
        .title { font-weight: 800; font-size: 1.1rem; }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            display: flex;
            flex-direction: column;
        }

        .message.mine {
            align-self: flex-end;
            align-items: flex-end;
        }

        .user-name {
            font-size: 0.8rem;
            margin-bottom: 5px;
            color: #444;
            font-weight: 600;
        }

        .bubble {
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message.mine .bubble {
            background-color: var(--my-bubble);
            border-top-right-radius: 2px;
        }

        .message.other .bubble {
            background-color: var(--other-bubble);
            border-top-left-radius: 2px;
        }

        .time {
            font-size: 0.7rem;
            color: #777;
            margin-top: 5px;
        }

        .input-area {
            background-color: white;
            padding: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #name-input {
            width: 80px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        #message-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
        }

        #send-btn {
            background-color: var(--kakao-yellow);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            color: var(--kakao-brown);
        }

        #send-btn:hover { background-color: #fada0a; }

        /* Scrollbar */
        #chat-container::-webkit-scrollbar { width: 6px; }
        #chat-container::-webkit-scrollbar-track { background: transparent; }
        #chat-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn">←</a>
        <div class="title">💬 수다 talk</div>
        <div style="width: 20px;"></div>
    </header>

    <div id="chat-container">
        <!-- 메시지들이 여기에 추가됩니다 -->
    </div>

    <div class="input-area">
        <input type="text" id="name-input" placeholder="이름" value="익명">
        <input type="text" id="message-input" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) sendMessage()">
        <button id="send-btn" onclick="sendMessage()">전송</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        // Firebase 설정 (실제 프로젝트 ID로 연결되도록 구성)
        const firebaseConfig = {
            databaseURL: "https://stec-chat-default-rtdb.firebaseio.com" 
        };
        
        let database;
        let chatRef;

        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            database = firebase.database();
            chatRef = database.ref('messages');
        } catch (e) {
            console.error("Firebase 초기화 오류:", e);
        }
        
        const chatContainer = document.getElementById('chat-container');
        const nameInput = document.getElementById('name-input');
        const messageInput = document.getElementById('message-input');

        let myId = localStorage.getItem('stec_chat_user_id') || 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('stec_chat_user_id', myId);

        // 개별 메시지 렌더링 함수
        function appendMessage(msg, isMine) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isMine ? 'mine' : 'other'}`;
            msgDiv.innerHTML = `
                <div class="user-name">${msg.name}</div>
                <div class="bubble">${msg.content}</div>
                <div class="time">${msg.time}</div>
            `;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 실시간 데이터 수신 (새로운 데이터가 추가될 때마다 실행)
        if (chatRef) {
            chatRef.limitToLast(50).on('child_added', (snapshot) => {
                const msg = snapshot.val();
                // 내가 보낸 메시지는 이미 화면에 있으므로, 남이 보낸 것만 추가 렌더링
                if (msg.senderId !== myId) {
                    appendMessage(msg, false);
                }
            });
        }

        function sendMessage() {
            const name = nameInput.value.trim() || "익명";
            const content = messageInput.value.trim();

            if (!content) return;

            const now = new Date();
            const timeStr = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });

            const newMsg = {
                senderId: myId,
                name: name,
                content: content,
                time: timeStr,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };

            // 1. 화면에 즉시 표시 (네트워크 지연 상관없이)
            appendMessage(newMsg, true);
            
            // 2. Firebase 전송
            if (chatRef) {
                chatRef.push(newMsg).catch(err => {
                    console.error("전송 실패 (서버 연결 확인 필요):", err);
                });
            }

            messageInput.value = '';
        }

        // 초기 안내 메시지
        setTimeout(() => {
            if (chatContainer.children.length === 0) {
                appendMessage({
                    name: "시스템",
                    content: "채팅방에 연결되었습니다. 자유롭게 대화하세요!",
                    time: "방금"
                }, false);
            }
        }, 1000);
    </script>
</body>
</html>
