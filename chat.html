<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수다 talk | STEC 반도체 장비 2기</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --kakao-yellow: #fee500;
            --kakao-brown: #3c1e1e;
            --chat-bg: #bacee0;
            --my-bubble: #fee500;
            --other-bubble: #ffffff;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            background-color: var(--chat-bg);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .back-btn { text-decoration: none; color: var(--kakao-brown); font-weight: 800; }
        .title { font-weight: 800; font-size: 1.1rem; }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            display: flex;
            flex-direction: column;
        }

        .message.mine {
            align-self: flex-end;
            align-items: flex-end;
        }

        .user-name {
            font-size: 0.8rem;
            margin-bottom: 5px;
            color: #444;
            font-weight: 600;
        }

        .bubble {
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message.mine .bubble {
            background-color: var(--my-bubble);
            border-top-right-radius: 2px;
        }

        .message.other .bubble {
            background-color: var(--other-bubble);
            border-top-left-radius: 2px;
        }

        .time {
            font-size: 0.7rem;
            color: #777;
            margin-top: 5px;
        }

        .input-area {
            background-color: white;
            padding: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #name-input {
            width: 80px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        #message-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
        }

        #send-btn {
            background-color: var(--kakao-yellow);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            color: var(--kakao-brown);
        }

        #send-btn:hover { background-color: #fada0a; }

        /* Scrollbar */
        #chat-container::-webkit-scrollbar { width: 6px; }
        #chat-container::-webkit-scrollbar-track { background: transparent; }
        #chat-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn">←</a>
        <div class="title">💬 수다 talk</div>
        <div style="width: 20px;"></div>
    </header>

    <div id="chat-container">
        <!-- 메시지들이 여기에 추가됩니다 -->
    </div>

    <div class="input-area">
        <input type="text" id="name-input" placeholder="이름" value="익명">
        <input type="text" id="message-input" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) sendMessage()">
        <button id="send-btn" onclick="sendMessage()">전송</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        // Firebase 설정
        const firebaseConfig = {
            databaseURL: "https://stec-chat-default-rtdb.firebaseio.com" 
        };
        
        let database;
        let chatRef;

        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            database = firebase.database();
            chatRef = database.ref('messages');
        } catch (e) {
            console.error("Firebase 초기화 오류:", e);
        }
        
        const chatContainer = document.getElementById('chat-container');
        const nameInput = document.getElementById('name-input');
        const messageInput = document.getElementById('message-input');

        // 내 고유 ID 고정
        let myId = localStorage.getItem('stec_chat_user_id');
        if (!myId) {
            myId = 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('stec_chat_user_id', myId);
        }

        // 메시지 렌더링 함수
        function renderAllMessages(data) {
            chatContainer.innerHTML = '';
            
            if (!data) {
                appendSystemMessage("채팅방에 연결되었습니다. 첫 메시지를 남겨보세요!");
                return;
            }

            // Firebase 데이터를 배열로 변환하여 시간순 정렬
            const messages = Object.values(data);
            
            messages.forEach(msg => {
                const msgDiv = document.createElement('div');
                const isMine = msg.senderId === myId;
                msgDiv.className = `message ${isMine ? 'mine' : 'other'}`;
                
                msgDiv.innerHTML = `
                    <div class="user-name">${msg.name}</div>
                    <div class="bubble">${msg.content}</div>
                    <div class="time">${msg.time}</div>
                `;
                chatContainer.appendChild(msgDiv);
            });
            
            // 화면 하단으로 스크롤
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function appendSystemMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message other';
            msgDiv.style.alignSelf = 'center';
            msgDiv.style.opacity = '0.7';
            msgDiv.innerHTML = `<div class="bubble" style="background:#eee; border-radius:10px; font-size:0.8rem;">${text}</div>`;
            chatContainer.appendChild(msgDiv);
        }

        // [핵심] 모든 메시지를 실시간으로 감시하고 갱신
        if (chatRef) {
            chatRef.limitToLast(50).on('value', (snapshot) => {
                const data = snapshot.val();
                renderAllMessages(data);
            });
        }

        function sendMessage() {
            const name = nameInput.value.trim() || "익명";
            const content = messageInput.value.trim();

            if (!content) return;

            const now = new Date();
            const timeStr = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });

            const newMsg = {
                senderId: myId,
                name: name,
                content: content,
                time: timeStr,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };

            // Firebase에 저장만 하면 on('value')가 감지해서 화면을 그려줍니다.
            if (chatRef) {
                chatRef.push(newMsg).catch(err => {
                    alert("메시지 전송에 실패했습니다. 인터넷 연결을 확인해주세요.");
                });
            }

            messageInput.value = '';
        }
    </script>
</body>
</html>
