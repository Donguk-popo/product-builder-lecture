<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수다 talk | STEC 반도체 장비 2기</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --kakao-yellow: #fee500;
            --kakao-brown: #3c1e1e;
            --chat-bg: #bacee0;
            --my-bubble: #fee500;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            background-color: var(--chat-bg);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .back-btn { text-decoration: none; color: var(--kakao-brown); font-weight: 800; }
        .title { font-weight: 800; font-size: 1.1rem; }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
            background-image: url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 60%;
            background-attachment: local;
        }

        /* 배경 이미지 투명도 조절을 위한 가상 요소 */
        #chat-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(186, 206, 224, 0.85); /* 기존 배경색과 합성 */
            z-index: 0;
            pointer-events: none;
        }

        .message {
            max-width: 85%;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            position: relative;
            z-index: 1;
        }

        .user-name {
            font-size: 1rem; /* 이름 크기 키움 */
            margin-bottom: 5px;
            color: #222;
            font-weight: 800;
        }

        .bubble {
            padding: 12px 18px; /* 패딩 키움 */
            border-radius: 18px;
            font-size: 1.1rem; /* 채팅 글자 크기 키움 */
            line-height: 1.5;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            background: white;
            display: inline-block;
            word-break: break-all;
        }

        .time {
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
        }

        /* 모바일 대응 */
        @media (max-width: 480px) {
            .bubble { font-size: 1rem; padding: 10px 15px; }
            .user-name { font-size: 0.9rem; }
            #chat-container { background-size: 80%; }
        }

        .message.mine .bubble {
            background-color: var(--my-bubble) !important;
            border-top-right-radius: 2px;
        }

        .message.other .bubble {
            border-top-left-radius: 2px;
        }

        .time {
            font-size: 0.7rem;
            color: #777;
            margin-top: 5px;
        }

        .input-area {
            background-color: white;
            padding: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #message-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
        }

        #send-btn {
            background-color: var(--kakao-yellow);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            color: var(--kakao-brown);
        }

        /* 이름 입력 모달 */
        #name-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 80%;
            max-width: 320px;
            text-align: center;
        }

        .modal-content h2 { margin-top: 0; font-size: 1.2rem; }
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1rem;
            text-align: center;
        }
        .modal-content button {
            width: 100%;
            padding: 12px;
            background: var(--kakao-yellow);
            border: none;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
        }

        #loader {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #777;
            background: rgba(255,255,255,0.8);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn">←</a>
        <div class="title">💬 수다 talk <span id="connection-status" style="font-size: 0.6rem; vertical-align: middle; margin-left: 5px; padding: 2px 6px; border-radius: 10px; background: #eee; color: #777;">연결 확인 중...</span></div>
        <div style="width: 20px;"></div>
    </header>

    <div id="chat-container">
        <div id="loader">채팅 서버에 연결 중...</div>
    </div>

    <div class="input-area">
        <input type="text" id="message-input" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) sendMessage()">
        <button id="send-btn" onclick="sendMessage()">전송</button>
    </div>

    <!-- 이름 입력 모달 -->
    <div id="name-modal">
        <div class="modal-content">
            <h2>대화명 설정</h2>
            <p>채팅방에서 사용할 이름을 적어주세요.</p>
            <input type="text" id="modal-name-input" placeholder="이름을 입력하세요" maxlength="10">
            <button onclick="setUserName()">입장하기</button>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        (function() {
            const chatContainer = document.getElementById('chat-container');
            const loader = document.getElementById('loader');
            const nameModal = document.getElementById('name-modal');
            
            const firebaseConfig = {
                apiKey: "AIzaSyCa_R4StCH81IxkmbPcxxiLiawJMwFxS1M",
                authDomain: "stec-chat.firebaseapp.com",
                databaseURL: "https://stec-chat-default-rtdb.firebaseio.com",
                projectId: "stec-chat",
                storageBucket: "stec-chat.firebasestorage.app",
                messagingSenderId: "655655599194",
                appId: "1:655655599194:web:3906470c84ffa692512c63",
                measurementId: "G-1RT2E5GNHZ"
            };

            let chatRef;
            let currentUserName = localStorage.getItem('stec_user_name');
            const myId = localStorage.getItem('stec_chat_user_id') || 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('stec_chat_user_id', myId);

            // 유저 ID 기반 고유 파스텔톤 컬러 생성 함수
            function getUserColor(userId) {
                let hash = 0;
                for (let i = 0; i < userId.length; i++) {
                    hash = userId.charCodeAt(i) + ((hash << 5) - hash);
                }
                const h = Math.abs(hash % 360);
                return `hsl(${h}, 70%, 90%)`; // 부드러운 파스텔톤
            }

            function appendMessage(msg, type = 'normal') {
                if(loader) loader.style.display = 'none';
                const msgDiv = document.createElement('div');
                const isMine = msg.senderId === myId;
                
                if (type === 'system') {
                    msgDiv.className = 'message other';
                    msgDiv.style.alignSelf = 'center';
                    msgDiv.innerHTML = `<div class="bubble" style="background:#eee; font-size:0.8rem;">${msg.content}</div>`;
                } else {
                    msgDiv.className = `message ${isMine ? 'mine' : 'other'}`;
                    const bubbleColor = isMine ? 'var(--my-bubble)' : getUserColor(msg.senderId);
                    
                    msgDiv.innerHTML = `
                        <div class="user-name">${msg.name || '익명'}</div>
                        <div class="bubble" style="background-color: ${bubbleColor}">${msg.content}</div>
                        <div class="time">${msg.time || ''}</div>
                    `;
                }
                chatContainer.appendChild(msgDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }

            function initFirebase() {
                try {
                    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                    const database = firebase.database();
                    chatRef = database.ref('messages');

                    chatRef.limitToLast(50).on('value', (snapshot) => {
                        chatContainer.innerHTML = '';
                        const data = snapshot.val();
                        if (!data) {
                            appendMessage({ content: '대화 기록이 없습니다. 먼저 말을 걸어보세요!' }, 'system');
                        } else {
                            Object.values(data).forEach(msg => appendMessage(msg));
                        }
                    });

                    const statusBadge = document.getElementById('connection-status');
                    database.ref('.info/connected').on('value', (snapshot) => {
                        if (snapshot.val() === true) {
                            statusBadge.innerText = '● Online';
                            statusBadge.style.background = '#e6fffa'; statusBadge.style.color = '#38a169';
                        } else {
                            statusBadge.innerText = '○ Offline';
                            statusBadge.style.background = '#fff5f5'; statusBadge.style.color = '#e53e3e';
                        }
                    });
                } catch (e) { console.error(e); }
            }

            // 이름 설정 함수
            window.setUserName = function() {
                const nameInput = document.getElementById('modal-name-input');
                const name = nameInput.value.trim();
                if (!name) { alert('이름을 입력해주세요!'); return; }
                
                currentUserName = name;
                localStorage.setItem('stec_user_name', name);
                nameModal.style.display = 'none';
            };

            window.sendMessage = function() {
                if (!currentUserName) { nameModal.style.display = 'flex'; return; }
                const messageInput = document.getElementById('message-input');
                const content = messageInput.value.trim();
                if (!content || !chatRef) return;

                chatRef.push({
                    senderId: myId,
                    name: currentUserName,
                    content: content,
                    time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
                messageInput.value = '';
            };

            // 초기 실행 로직
            if (currentUserName) nameModal.style.display = 'none';
            
            const checkFirebase = setInterval(() => {
                if (typeof firebase !== 'undefined') {
                    clearInterval(checkFirebase);
                    initFirebase();
                }
            }, 100);
        })();
    </script>
</body>
</html>
