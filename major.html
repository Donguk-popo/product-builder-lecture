<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전공 교과 | STEC 반도체 장비 2기</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --stec-blue: #004a99; --stec-light: #f4f7fa; --white: #ffffff; --text: #2f3542; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--stec-light); color: var(--text); line-height: 1.6; }
        nav { background: var(--stec-blue); padding: 15px 5%; color: white; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000; }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        
        h1 { font-family: 'Jua'; font-size: 2.5rem; color: var(--stec-blue); text-align: center; margin-bottom: 30px; }
        
        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .cat-btn { background: var(--white); border: 3px solid var(--stec-blue); border-radius: 20px; padding: 40px 20px; font-size: 1.4rem; font-family: 'Jua'; color: var(--stec-blue); cursor: pointer; transition: all 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .cat-btn:hover { background: var(--stec-blue); color: white; transform: translateY(-5px); }
        .cat-btn.active { background: var(--stec-blue); color: white; }

        .sub-tabs { display: none; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .sub-tabs.active { display: flex; }
        .tab-btn { padding: 10px 25px; border-radius: 50px; border: 2px solid #ddd; background: white; cursor: pointer; font-weight: 800; font-size: 1rem; transition: all 0.3s; }
        .tab-btn.active { border-color: var(--stec-blue); background: var(--stec-blue); color: white; }

        .board-container { background: white; border-radius: 30px; padding: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); }
        .write-area { margin-bottom: 30px; padding-bottom: 30px; border-bottom: 2px dashed #eee; }
        .write-area textarea { width: 100%; height: 100px; padding: 15px; border-radius: 15px; border: 1px solid #ddd; font-family: inherit; font-size: 1rem; resize: none; box-sizing: border-box; outline: none; margin-bottom: 15px; }
        
        .write-footer { display: flex; justify-content: space-between; align-items: center; }
        .write-footer input { padding: 12px; border-radius: 10px; border: 1px solid #ddd; width: 65%; font-size: 0.95rem; }
        .post-btn { background: var(--stec-blue); color: white; border: none; padding: 12px 30px; border-radius: 10px; font-weight: 800; cursor: pointer; font-size: 1rem; }
        .post-btn:hover { opacity: 0.9; }

        .post-item { background: #f8f9ff; padding: 25px; border-radius: 20px; margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.03); }
        .post-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; color: #666; }
        .post-author { font-weight: 800; color: var(--stec-blue); }
        .post-content { font-size: 1.1rem; white-space: pre-wrap; word-break: break-all; color: #333; }

        .back-btn { display: inline-block; margin-bottom: 20px; color: var(--stec-blue); text-decoration: none; font-weight: bold; }

        @media (max-width: 768px) {
            .category-grid { grid-template-columns: 1fr; }
            .cat-btn { padding: 25px 15px; font-size: 1.2rem; }
            h1 { font-size: 1.8rem; }
            .write-footer { flex-direction: column; gap: 10px; }
            .write-footer input { width: 100%; }
            .post-btn { width: 100%; }
        }
    </style>
</head>
<body>
    <nav><div class="logo">STEC <span>SEMI 2nd</span></div><a href="index.html" style="color:white; text-decoration:none; font-weight:bold;">홈으로</a></nav>
    <div class="container">
        <a href="index.html" class="back-btn">← 뒤로가기</a>
        <h1>🔬 전공 교과 커뮤니티</h1>

        <div class="category-grid">
            <button class="cat-btn" id="cat-plc" onclick="selectMainCategory('plc')">반도체 장비<br>PLC제어</button>
            <button class="cat-btn" id="cat-design" onclick="selectMainCategory('design')">전장제어반<br>설계 및 제작</button>
        </div>

        <div class="sub-tabs" id="plc-tabs">
            <button class="tab-btn active" onclick="selectSubCategory('PLC')">PLC</button>
            <button class="tab-btn" onclick="selectSubCategory('HMI')">HMI</button>
            <button class="tab-btn" onclick="selectSubCategory('SERVO')">SERVO</button>
        </div>

        <div id="board-area" style="display: none;">
            <div class="board-container">
                <h2 id="current-board-title" style="font-family: 'Jua'; margin-top: 0; color: var(--stec-blue);">PLC 게시판</h2>
                <div class="write-area">
                    <textarea id="post-input" placeholder="오늘 배운 내용이나 유용한 링크를 공유해보세요!"></textarea>
                    <div class="write-footer">
                        <input type="text" id="author-input" placeholder="작성자 이름">
                        <button class="post-btn" id="submit-btn" onclick="addPost()">등록하기</button>
                    </div>
                </div>
                <div id="post-list">
                    <p style="text-align: center; color: #999;">글을 불러오는 중...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs (Storage 제거) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCa_R4StCH81IxkmbPcxxiLiawJMwFxS1M",
            authDomain: "stec-chat.firebaseapp.com",
            databaseURL: "https://stec-chat-default-rtdb.firebaseio.com",
            projectId: "stec-chat"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let mainCat = '';
        let subCat = '';

        function selectMainCategory(type) {
            mainCat = type;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`cat-${type}`).classList.add('active');
            
            const plcTabs = document.getElementById('plc-tabs');
            if(type === 'plc') {
                plcTabs.classList.add('active');
                selectSubCategory('PLC');
            } else {
                plcTabs.classList.remove('active');
                subCat = 'DESIGN';
                openBoard('전장제어반 설계 및 제작 게시판');
            }
        }

        function selectSubCategory(type) {
            subCat = type;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(event && event.target.classList.contains('tab-btn')) {
                event.target.classList.add('active');
            }
            openBoard(`${type} 게시판`);
        }

        function openBoard(title) {
            document.getElementById('board-area').style.display = 'block';
            document.getElementById('current-board-title').innerText = title;
            loadPosts();
        }

        function addPost() {
            const author = document.getElementById('author-input').value.trim() || '익명';
            const content = document.getElementById('post-input').value.trim();
            const btn = document.getElementById('submit-btn');

            if(!content) return alert('내용을 입력해주세요!');

            btn.disabled = true;
            btn.innerText = '등록 중...';

            const path = `major_v2/${mainCat}/${subCat}`;
            database.ref(path).push({
                author, content,
                time: new Date().toLocaleString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
                timestamp: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                document.getElementById('post-input').value = '';
                btn.disabled = false;
                btn.innerText = '등록하기';
            }).catch(e => {
                console.error(e);
                alert('등록 실패!');
                btn.disabled = false;
            });
        }

        function loadPosts() {
            const listEl = document.getElementById('post-list');
            const path = `major_v2/${mainCat}/${subCat}`;
            
            database.ref(path).on('value', (snapshot) => {
                listEl.innerHTML = '';
                const data = snapshot.val();
                if(!data) {
                    listEl.innerHTML = '<p style="text-align: center; color: #999; padding: 40px 0;">첫 게시글을 남겨보세요!</p>';
                    return;
                }
                Object.values(data).reverse().forEach(post => {
                    const item = document.createElement('div');
                    item.className = 'post-item';
                    item.innerHTML = `
                        <div class="post-header">
                            <span class="post-author">${post.author}</span>
                            <span>${post.time}</span>
                        </div>
                        <div class="post-content">${post.content}</div>
                    `;
                    listEl.appendChild(item);
                });
            });
        }
    </script>
</body>
</html>
