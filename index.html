<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추천기</title>
    <style>
        :root {
            --bg-color: #f4f6f8;
            --text-color: #2c3e50;
            --button-bg: #3498db;
            --button-hover: #2980b9;
            --ball-bg: #ffcc00;
            --ball-text: #333;
            --container-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #ecf0f1;
            --button-bg: #2980b9;
            --button-hover: #3498db;
            --ball-bg: #f1c40f;
            --ball-text: #000;
            --container-bg: #2c3e50;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            text-align: center;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 50px;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            display: inline-block;
            transition: background-color 0.3s;
        }

        h1 {
            color: var(--text-color);
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px;
            cursor: pointer;
            border-radius: 50%;
            border: none;
            background: var(--container-bg);
            color: var(--text-color);
            font-size: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        button.generate-btn {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background-color: var(--button-bg);
            color: white;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button.generate-btn:hover {
            background-color: var(--button-hover);
        }

        .numbers {
            margin-top: 30px;
            font-size: 24px;
            font-weight: bold;
        }

        .ball {
            display: inline-block;
            width: 50px;
            height: 50px;
            line-height: 50px;
            margin: 5px;
            border-radius: 50%;
            background-color: var(--ball-bg);
            color: var(--ball-text);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            animation: bounce 0.5s ease-out;
        }

        @keyframes bounce {
            0% { transform: scale(0); }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌓</button>

    <div class="container">
        <h1>🎯 로또 번호 추천기</h1>
        <button class="generate-btn" onclick="generateLotto()">번호 뽑기</button>
        <div class="numbers" id="result"></div>
    </div>

    <script>
        // 테마 초기화
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        function generateLotto() {
            let numbers = [];

            while (numbers.length < 6) {
                let num = Math.floor(Math.random() * 45) + 1;
                if (!numbers.includes(num)) {
                    numbers.push(num);
                }
            }

            numbers.sort((a, b) => a - b);

            let resultDiv = document.getElementById("result");
            resultDiv.innerHTML = "";

            numbers.forEach((n, index) => {
                setTimeout(() => {
                    let ball = document.createElement("span");
                    ball.className = "ball";
                    ball.textContent = n;
                    resultDiv.appendChild(ball);
                }, index * 100);
            });
        }
    </script>

</body>
</html>
