<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로또 번호 추천기</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f6f8;
            padding: 50px;
        }
        h1 {
            color: #2c3e50;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background-color: #3498db;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #2980b9;
        }
        .numbers {
            margin-top: 30px;
            font-size: 24px;
            font-weight: bold;
        }
        .ball {
            display: inline-block;
            width: 50px;
            height: 50px;
            line-height: 50px;
            margin: 5px;
            border-radius: 50%;
            background-color: #ffcc00;
            color: #333;
        }
    </style>
</head>
<body>

    <h1>🎯 로또 번호 추천기</h1>
    <button onclick="generateLotto()">번호 뽑기</button>

    <div class="numbers" id="result"></div>

    <script>
        function generateLotto() {
            let numbers = [];

            while (numbers.length < 6) {
                let num = Math.floor(Math.random() * 45) + 1;
                if (!numbers.includes(num)) {
                    numbers.push(num);
                }
            }

            numbers.sort((a, b) => a - b);

            let resultDiv = document.getElementById("result");
            resultDiv.innerHTML = "";

            numbers.forEach(n => {
                let ball = document.createElement("span");
                ball.className = "ball";
                ball.textContent = n;
                resultDiv.appendChild(ball);
            });
        }
    </script>

</body>
</html>
